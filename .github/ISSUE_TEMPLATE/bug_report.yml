name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Add DeepSeek node to workflow
        2. Set Thinking Mode to enabled
        3. Execute step
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: n8n-version
    attributes:
      label: n8n version
      placeholder: "e.g. 1.77.0"

  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: "e.g. 1.0.0"

  - type: textarea
    id: logs
    attributes:
      label: Error logs / screenshots
      description: Paste any relevant error output
